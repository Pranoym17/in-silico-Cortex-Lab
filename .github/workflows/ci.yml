name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cortexlab
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cortex -d cortexlab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements-dev.txt
      - run: python -m alembic upgrade head
        working-directory: backend
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://cortex:cortex@localhost:5432/cortexlab
      - run: pytest backend/tests
        env:
          PYTHONPATH: backend
          DATABASE_URL: postgresql+asyncpg://cortex:cortex@localhost:5432/cortexlab
          CORTEX_RUN_DB_TESTS: "1"
      - run: ruff check backend/app backend/tests
        env:
          PYTHONPATH: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
