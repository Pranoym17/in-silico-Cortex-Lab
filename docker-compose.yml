services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cortexlab
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./inference:/inference
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO

volumes:
  postgres_data:

